<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" font-family="'SF Mono',Menlo,Consolas,'Courier New',monospace">
  <defs>
    <clipPath id="win"><rect width="1000" height="260" rx="14"/></clipPath>
    <clipPath id="type1"><rect x="150" y="78" width="0" height="30" class="tw1"/></clipPath>
    <clipPath id="type2"><rect x="150" y="158" width="0" height="30" class="tw2"/></clipPath>
    <style>
      .tw1{animation:typing1 1.6s steps(16,end) forwards .5s}
      @keyframes typing1{to{width:170px}}
      .tw2{animation:typing2 2.8s steps(38,end) forwards 4.4s}
      @keyframes typing2{to{width:560px}}
      .out1{opacity:0;animation:show .01s forwards 2.6s}
      .out2{opacity:0;animation:show .01s forwards 7.6s}
      @keyframes show{to{opacity:1}}
      .cursor{fill:#4ade80;animation:blink 1.1s steps(1) infinite}
      @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
      .c1{animation:curmove1 1.6s steps(16,end) forwards .5s}
      @keyframes curmove1{to{transform:translateX(170px)}}
      .c2{animation:curmove2 2.8s steps(38,end) forwards 4.4s}
      @keyframes curmove2{to{transform:translateX(560px)}}
    </style>
  </defs>
  <g clip-path="url(#win)">
    <rect width="1000" height="260" fill="#0d1117"/>
    <rect width="1000" height="40" fill="#161b22"/>
    <circle cx="26" cy="20" r="7" fill="#ff5f56"/>
    <circle cx="50" cy="20" r="7" fill="#ffbd2e"/>
    <circle cx="74" cy="20" r="7" fill="#27c93f"/>
    <text x="500" y="25" text-anchor="middle" font-size="13" fill="#8b949e">ning@github: ~/profile</text>

    <!-- line 1: $ whoami -->
    <text x="120" y="100" font-size="20" fill="#4ade80">$</text>
    <g clip-path="url(#type1)"><text x="150" y="100" font-size="20" fill="#e6edf3">whoami --verbose</text></g>
    <g class="c1"><rect class="cursor" x="152" y="82" width="11" height="22"/></g>

    <!-- output 1 -->
    <g class="out1">
      <text x="150" y="134" font-size="18" fill="#79c0ff">Ning <tspan fill="#8b949e">·</tspan> <tspan fill="#e6edf3">Java Backend Developer</tspan> <tspan fill="#8b949e">·</tspan> <tspan fill="#f778ba">high-concurrency realtime services</tspan></text>
    </g>

    <!-- line 2: $ stack -->
    <g class="out1">
      <text x="120" y="180" font-size="20" fill="#4ade80">$</text>
    </g>
    <g clip-path="url(#type2)"><text x="150" y="180" font-size="20" fill="#e6edf3">ls skills/ <tspan fill="#8b949e"># Java · Spring Boot · Netty · Redis · Kafka</tspan></text></g>
    <g class="out1"><g class="c2"><rect class="cursor" x="152" y="162" width="11" height="22"/></g></g>

    <!-- output 2 -->
    <g class="out2">
      <text x="150" y="216" font-size="18" fill="#ffa657">websocket-gateway/  im-server/  game-backend/  <tspan fill="#4ade80">✔ all systems operational</tspan></text>
    </g>
  </g>
</svg>
